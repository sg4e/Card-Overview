name: Build executable

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Card Overview Team Hundo
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v3

      - name: Install .NET Framework 4.5.2 Developer Pack
        shell: powershell
        run: choco install netfx-4.5.2-devpack -y --no-progress

      - name: Restore NuGet packages
        run: nuget restore packages.config -PackagesDirectory ..\packages

      - name: Build executable
        run: msbuild "card overview wpf.csproj" /p:Configuration=Release /p:Platform=AnyCPU /p:RestorePackages=false

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: Card Overview Team Hundo
          path: bin\Release\Card Overview Team Hundo.exe
          if-no-files-found: error

  release:
    name: Publish Card Overview Team Hundo release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Download executable artifact
        uses: actions/download-artifact@v7
        with:
          name: Card Overview Team Hundo
          path: release-assets

      - name: Generate release attestation
        uses: actions/attest@v4
        with:
          subject-path: release-assets\Card Overview Team Hundo.exe

      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSET_PATH: release-assets\Card Overview Team Hundo.exe
        run: |
          $asset = "${env:RELEASE_ASSET_PATH}#Card Overview Team Hundo.exe"
          gh release create $env:GITHUB_REF_NAME $asset --title $env:GITHUB_REF_NAME --generate-notes --verify-tag
